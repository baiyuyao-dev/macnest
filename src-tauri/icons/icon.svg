<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 简洁深色背景 -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </radialGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- 蜂巢网格（7个六边形） -->
  <g transform="translate(512, 512)">
    <!-- 中心六边形 -->
    <polygon
      points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
      fill="none"
      stroke="#f59e0b"
      stroke-width="8"
      stroke-linejoin="round"
    />
    <!-- 上 -->
    <g transform="translate(0, -173.2)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 右上 -->
    <g transform="translate(150, -86.6)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 右下 -->
    <g transform="translate(150, 86.6)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 下 -->
    <g transform="translate(0, 173.2)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 左下 -->
    <g transform="translate(-150, 86.6)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 左上 -->
    <g transform="translate(-150, -86.6)">
      <polygon
        points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
        fill="none"
        stroke="#f59e0b"
        stroke-width="8"
        stroke-linejoin="round"
      />
    </g>
  </g>
</svg>