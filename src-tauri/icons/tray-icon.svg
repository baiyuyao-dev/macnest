<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 蜂巢网格（7个六边形简化版） -->
  <g transform="translate(16, 16)">
    <!-- 中心六边形 -->
    <polygon
      points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
      fill="none"
      stroke="black"
      stroke-width="1.8"
      stroke-linejoin="round"
    />
    <!-- 上 -->
    <g transform="translate(0, -12.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 右上 -->
    <g transform="translate(10.5, -6.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 右下 -->
    <g transform="translate(10.5, 6.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 下 -->
    <g transform="translate(0, 12.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 左下 -->
    <g transform="translate(-10.5, 6.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
    <!-- 左上 -->
    <g transform="translate(-10.5, -6.1)">
      <polygon
        points="0,-7 6.1,-3.5 6.1,3.5 0,7 -6.1,3.5 -6.1,-3.5"
        fill="none"
        stroke="black"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </g>
  </g>
</svg>